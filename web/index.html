<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetify - Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: #fff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 600px; 
            width: 90%;
            text-align: center;
            padding: 40px;
        }
        .logo { 
            font-size: 80px; 
            margin-bottom: 20px; 
        }
        h1 { 
            font-size: 48px; 
            margin-bottom: 10px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 18px;
        }
        .join-form {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        input { 
            width: 100%;
            padding: 16px 20px; 
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px; 
            font-size: 18px; 
            background: rgba(0,0,0,0.2);
            color: #fff;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        input::placeholder {
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 16px 24px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        .divider {
            margin: 30px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            background: #1a1a2e;
            padding: 0 20px;
            color: #666;
            position: relative;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .feature {
            text-align: center;
        }
        .feature-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        .feature-text {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎥</div>
        <h1>Meetify</h1>
        <p class="subtitle">Видеоконференции без регистрации</p>
        
        <div class="join-form">
            <input type="text" id="roomId" placeholder="Введите ID комнаты" maxlength="20">
            <button class="btn btn-primary" onclick="joinRoom()">🔑 Присоединиться</button>
            
            <div class="divider"><span>или</span></div>
            
            <button class="btn btn-secondary" onclick="createRoom()">➕ Создать новую комнату</button>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">Приватно</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Быстро</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💬</div>
                <div class="feature-text">С чатом</div>
            </div>
        </div>
    </div>
    
    <script>
        function createRoom() {
            var roomId = Math.random().toString(36).substring(2, 9);
            window.location.href = '/room.html?id=' + roomId;
        }
        
        function joinRoom() {
            var roomId = document.getElementById('roomId').value.trim();
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            window.location.href = '/room.html?id=' + encodeURIComponent(roomId);
        }
        
        // Enter для входа
        document.getElementById('roomId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
