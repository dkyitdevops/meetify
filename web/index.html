<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetify - Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: #fff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 600px; 
            width: 90%;
            text-align: center;
            padding: 40px;
        }
        .logo { 
            font-size: 80px; 
            margin-bottom: 20px; 
        }
        h1 { 
            font-size: 48px; 
            margin-bottom: 10px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 18px;
        }
        .join-form {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        input { 
            width: 100%;
            padding: 16px 20px; 
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px; 
            font-size: 18px; 
            background: rgba(0,0,0,0.2);
            color: #fff;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        input::placeholder {
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 16px 24px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        .divider {
            margin: 30px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            background: #1a1a2e;
            padding: 0 20px;
            color: #666;
            position: relative;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .feature {
            text-align: center;
        }
        .feature-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        .feature-text {
            color: #888;
            font-size: 14px;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        .modal-content h2 {
            font-size: 28px;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input {
            margin-bottom: 15px;
        }

        .modal-content label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .modal-content label input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .modal-content .btn {
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎥</div>
        <h1>Meetify</h1>
        <p class="subtitle">Видеоконференции без регистрации</p>
        
        <div class="join-form">
            <input type="text" id="roomId" placeholder="Введите ID комнаты" maxlength="20">
            <input type="password" id="roomPassword" placeholder="Пароль (если есть)" style="display: none;">
            <button class="btn btn-primary" onclick="joinRoom()">🔑 Присоединиться</button>
            
            <div class="divider"><span>или</span></div>
            
            <button class="btn btn-secondary" onclick="createRoom()">➕ Создать новую комнату</button>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">Приватно</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Быстро</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💬</div>
                <div class="feature-text">С чатом</div>
            </div>
        </div>
    </div>

    <!-- Modal for creating room -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h2>Создать новую комнату</h2>
            <input type="text" id="newRoomName" placeholder="Название (опционально)" maxlength="100">
            <input type="password" id="newRoomPasswordModal" placeholder="Пароль (опционально)" maxlength="50">
            <label><input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()"> Показать пароль</label>
            <button class="btn btn-primary" onclick="createRoomWithSettings()">Создать комнату</button>
            <button class="btn btn-secondary" onclick="closeCreateRoomModal()">Отмена</button>
        </div>
    </div>
    
    <script>
        function createRoom() {
            // Открываем модальное окно вместо старого поведения
            document.getElementById('createRoomModal').classList.add('show');
            document.getElementById('newRoomName').focus();
        }

        function closeCreateRoomModal() {
            document.getElementById('createRoomModal').classList.remove('show');
            // Очищаем поля
            document.getElementById('newRoomName').value = '';
            document.getElementById('newRoomPasswordModal').value = '';
            document.getElementById('showPassword').checked = false;
            document.getElementById('newRoomPasswordModal').type = 'password';
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('newRoomPasswordModal');
            const showPasswordCheckbox = document.getElementById('showPassword');
            passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
        }

        async function createRoomWithSettings() {
            const name = document.getElementById('newRoomName').value.trim();
            const password = document.getElementById('newRoomPasswordModal').value;

            try {
                const response = await fetch('/api/rooms', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, password })
                });

                if (!response.ok) {
                    throw new Error('Ошибка создания комнаты');
                }

                const data = await response.json();
                const roomId = data.roomId || data.id;

                // Редирект в комнату
                window.location.href = '/room.html?id=' + encodeURIComponent(roomId);
            } catch (error) {
                alert('Не удалось создать комнату: ' + error.message);
            }
        }

        // Закрытие модалки по клику вне контента
        document.getElementById('createRoomModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCreateRoomModal();
            }
        });

        // Enter для создания комнаты
        document.getElementById('newRoomPasswordModal').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') createRoomWithSettings();
        });
        
        function joinRoom() {
            var roomId = document.getElementById('roomId').value.trim();
            var password = document.getElementById('roomPassword').value;
            
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            
            window.location.href = '/room.html?id=' + encodeURIComponent(roomId) + (password ? '&pwd=' + encodeURIComponent(password) : '');
        }
        
        // Показываем поле пароля если в URL есть hasPassword
        if (window.location.search.includes('hasPassword=1')) {
            document.getElementById('roomPassword').style.display = 'block';
        }
        
        // Enter для входа
        document.getElementById('roomId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
