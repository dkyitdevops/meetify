<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetify - Видеоконференции</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #eee; }
        .room-controls { text-align: center; margin-bottom: 30px; }
        input { padding: 12px 20px; border: none; border-radius: 8px; margin-right: 10px; font-size: 16px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #667eea; color: #fff; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #764ba2; }
        .main-content { display: flex; gap: 20px; }
        .video-section { flex: 2; }
        #videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        video { width: 100%; border-radius: 12px; background: #16213e; }
        .local-video { border: 3px solid #667eea; }
        .status { text-align: center; margin: 20px 0; padding: 10px; border-radius: 8px; }
        .status.connected { background: #22c55e; }
        .status.connecting { background: #f59e0b; }
        .status.error { background: #ef4444; }
        
        /* Чат */
        .chat-section { flex: 1; min-width: 300px; max-width: 400px; }
        .chat-container { background: #16213e; border-radius: 12px; height: 500px; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: #0f3460; border-radius: 12px 12px 0 0; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-message { margin-bottom: 10px; padding: 8px 12px; background: #1a1a2e; border-radius: 8px; }
        .chat-message .author { font-weight: bold; color: #667eea; font-size: 12px; }
        .chat-message .text { margin-top: 4px; word-break: break-word; }
        .chat-message.own { background: #667eea; margin-left: 20px; }
        .chat-message.own .author { color: #fff; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #0f3460; }
        .chat-input input { flex: 1; margin-right: 10px; }
        .chat-input button { padding: 10px 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Meetify</h1>
        <div class="room-controls">
            <input type="text" id="roomId" placeholder="ID комнаты" value="">
            <button onclick="joinRoom()">Присоединиться</button>
            <button onclick="createRoom()">Создать комнату</button>
        </div>
        <div id="status" class="status">Не подключено</div>
        
        <div class="main-content">
            <div class="video-section">
                <div id="videos"></div>
            </div>
            
            <div class="chat-section hidden" id="chatSection">
                <div class="chat-container">
                    <div class="chat-header">💬 Чат комнаты</div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
