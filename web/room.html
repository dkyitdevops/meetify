<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetify - Комната</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #1a1a2e; 
            color: #fff; 
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            text-decoration: none;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .room-id {
            background: rgba(102, 126, 234, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
        .copy-btn {
            background: #667eea;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .copy-btn:hover {
            background: #764ba2;
        }
        
        .main-content { 
            display: flex; 
            gap: 20px; 
            padding: 20px;
            height: calc(100vh - 140px);
        }
        
        .video-section { 
            flex: 2; 
            display: flex;
            flex-direction: column;
        }
        
        #videos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
            flex: 1;
            overflow-y: auto;
            align-content: start;
        }
        
        video { 
            width: 100%; 
            height: 100%;
            max-height: 400px;
            border-radius: 12px; 
            background: #16213e;
            object-fit: cover;
        }
        
        .local-video { 
            border: 3px solid #667eea; 
        }
        
        /* Контролы */
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
        }
        
        .control-btn { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: none;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px;
            background: #667eea;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .control-btn:hover { 
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .control-btn.muted { 
            background: #ef4444; 
        }
        
        .control-btn.leave {
            background: #dc2626;
        }
        
        .control-btn.leave:hover {
            background: #b91c1c;
        }
        
        /* Чат */
        .chat-section { 
            flex: 1; 
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-container { 
            background: #16213e; 
            border-radius: 16px; 
            flex: 1;
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header { 
            padding: 20px; 
            background: #0f3460; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
        }
        
        .chat-message { 
            margin-bottom: 15px; 
            padding: 12px 16px; 
            background: #1a1a2e; 
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message .author { 
            font-weight: bold; 
            color: #667eea; 
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .chat-message .text { 
            word-break: break-word;
            line-height: 1.4;
        }
        
        .chat-message.system {
            background: rgba(102, 126, 234, 0.1);
            font-style: italic;
            color: #888;
        }
        
        .chat-input { 
            display: flex; 
            padding: 20px;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .chat-input input { 
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
        }
        
        .chat-input input::placeholder {
            color: #666;
        }
        
        .chat-input input:focus {
            outline: 2px solid #667eea;
        }
        
        .chat-input button { 
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: #667eea;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        
        .chat-input button:hover {
            background: #764ba2;
        }
        
        /* Подключение */
        .connecting-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .connecting-screen.hidden {
            display: none !important;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Экран подключения -->
    <div class="connecting-screen" id="connectingScreen">
        <div class="spinner"></div>
        <p>Подключение к комнате...</p>
    </div>
    
    <div class="header">
        <a href="/" class="logo">🎥 Meetify</a>
        <div class="room-info">
            <span>Комната:</span>
            <span class="room-id" id="roomIdDisplay">...</span>
            <button class="copy-btn" onclick="copyRoomId()">📋 Копировать</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="video-section">
            <div id="videos"></div>
            
            <div class="controls">
                <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Микрофон">🎤</button>
                <button class="control-btn" id="camBtn" onclick="toggleCam()" title="Камера">📹</button>
                <button class="control-btn leave" onclick="leaveRoom()" title="Выйти">📞</button>
            </div>
        </div>
        
        <div class="chat-section">
            <div class="chat-container">
                <div class="chat-header">
                    💬 Чат
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Введите сообщение..." maxlength="500">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/room.js"></script>
</body>
</html>
