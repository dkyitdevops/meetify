version: '3.8'

services:
  ai-team-office:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-team-office-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./server/logs:/var/log/ai-team-office
    networks:
      - ai-office-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/agents/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ai-office-network:
    driver: bridge
