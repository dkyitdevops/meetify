name: Health Check & Monitoring

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  health-check:
    name: Check Services
    runs-on: ubuntu-latest
    
    steps:
    - name: Check API health
      run: |
        curl -sf https://46-149-68-9.nip.io/health || exit 1
      timeout-minutes: 1
    
    - name: Check WebSocket
      run: |
        curl -sf -I https://46-149-68-9.nip.io/socket.io/ || exit 1
      timeout-minutes: 1
    
    - name: Check SSL certificate
      run: |
        EXPIRY=$(echo | openssl s_client -servername 46-149-68-9.nip.io -connect 46-149-68-9.nip.io:443 2>/dev/null | openssl x509 -noout -dates | grep notAfter | cut -d= -f2)
        EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
        NOW_EPOCH=$(date +%s)
        DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
        
        echo "SSL certificate expires in $DAYS_LEFT days"
        
        if [ "$DAYS_LEFT" -lt 7 ]; then
          echo "⚠️ SSL certificate expires soon!"
          exit 1
        fi
    
    - name: Notify on failure
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "🚨 Meetify health check failed!\n<https://46-149-68-9.nip.io|Check site>"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
