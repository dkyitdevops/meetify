name: Playwright UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: |
        cd tests
        npm install @playwright/test
        npm install
    
    - name: Install Playwright Browsers
      run: |
        cd tests
        npx playwright install chromium
      env:
        PLAYWRIGHT_BROWSERS_PATH: 0
    
    - name: Run Playwright smoke tests
      run: |
        cd tests
        npx playwright test playwright-smoke.spec.js --reporter=html
      env:
        CI: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: tests/playwright-report/
        retention-days: 30
    
    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-failures
        path: |
          tests/test-results/
          tests/playwright-report/
        retention-days: 7
    
    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = 'tests/playwright-report/index.html';
          let reportUrl = '';
          
          if (fs.existsSync(path)) {
            reportUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🎭 Playwright Tests: ${process.env.TEST_STATUS || 'completed'}\n\nReport: ${reportUrl}`
          });